<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Vídeos - Skull Tales</title>
    <link href="css/estilos.css?v=1.5" rel="stylesheet">
    <link href="css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        .video-gallery {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .video-placeholder {
            background: rgba(0, 0, 0, 0.1);
            border: 2px dashed #b89b65;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            color: #555;
        }
    </style>
</head>

<body>
    <script src="js/videos-data.js"></script>
    <main>
        <a class="boton-retorno" href="index.html">← Volver al Menú Principal</a>

        <center>
            <h1 style="font-family: 'Pirata One', cursive; font-size: 3rem;">Vídeos Skull Tales (Clasificados por Riojano2002)</h1>
            <p>Galería de vídeos y tutoriales.</p>
        </center>

        <!-- Filters Section -->
        <div style="background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #d4c5a3;">
            <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                <div>
                    <label for="filter-version"><strong>Versión:</strong></label>
                    <select id="filter-version" onchange="renderVideos()" style="padding: 5px; border-radius: 4px;">
                        <!-- Options populated by JS -->
                    </select>
                </div>
                <div>
                    <label for="filter-type"><strong>Tipo de Vídeo:</strong></label>
                    <select id="filter-type" onchange="renderVideos()" style="padding: 5px; border-radius: 4px;">
                        <!-- Options populated by JS -->
                    </select>
                </div>
                <div>
                    <label for="filter-author"><strong>Autor:</strong></label>
                    <select id="filter-author" onchange="renderVideos()" style="padding: 5px; border-radius: 4px;">
                        <!-- Options populated by JS -->
                    </select>
                </div>
            </div>
        </div>

        <div id="video-gallery" class="video-gallery">
            <!-- Videos populated by JS -->
        </div>

    </main>

    <script>
        // Init Filters
        const versionSelect = document.getElementById('filter-version');
        const typeSelect = document.getElementById('filter-type');
        const authorSelect = document.getElementById('filter-author');

        videoOptions.versions.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt === "Todas" ? "" : opt;
            el.textContent = opt;
            versionSelect.appendChild(el);
        });

        videoOptions.types.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt === "Todos" ? "" : opt;
            el.textContent = opt;
            typeSelect.appendChild(el);
        });

        if (videoOptions.authors) {
            videoOptions.authors.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt === "Todos" ? "" : opt;
                el.textContent = opt;
                authorSelect.appendChild(el);
            });
        }

        function renderVideos() {
            const gallery = document.getElementById('video-gallery');
            gallery.innerHTML = "";

            const selectedVersion = versionSelect.value;
            const selectedType = typeSelect.value;
            const selectedAuthor = authorSelect.value;

            const filteredVideos = videosData.filter(v => {
                const matchVersion = selectedVersion === "" || v.version === selectedVersion;
                const matchType = selectedType === "" || v.type === selectedType;
                const matchAuthor = selectedAuthor === "" || v.author === selectedAuthor;
                return matchVersion && matchType && matchAuthor;
            });

            if (filteredVideos.length === 0) {
                gallery.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; background: rgba(0,0,0,0.1); border-radius: 10px;">No se encontraron vídeos con estos criterios.</div>';
                return;
            }

            filteredVideos.forEach(v => {
                const card = document.createElement('div');
                card.style.background = "rgba(255, 255, 255, 0.95)";
                card.style.border = "1px solid #b89b65";
                card.style.borderRadius = "8px";
                card.style.overflow = "hidden";
                card.style.display = "flex";
                card.style.flexDirection = "column";
                card.style.boxShadow = "0 2px 5px rgba(0,0,0,0.2)";

                // Thumbnail container
                const thumbContainer = document.createElement('div');
                thumbContainer.style.position = "relative";
                thumbContainer.style.paddingTop = "56.25%"; // 16:9 aspect ratio
                thumbContainer.style.overflow = "hidden";
                thumbContainer.style.background = "#000";

                const thumb = document.createElement('img');
                thumb.src = `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`;
                thumb.style.position = "absolute";
                thumb.style.top = "0";
                thumb.style.left = "0";
                thumb.style.width = "100%";
                thumb.style.height = "100%";
                thumb.style.objectFit = "cover";
                thumbContainer.appendChild(thumb);

                // Play Icon Overlay
                const playOverlay = document.createElement('div');
                playOverlay.innerHTML = "▶";
                playOverlay.style.position = "absolute";
                playOverlay.style.top = "50%";
                playOverlay.style.left = "50%";
                playOverlay.style.transform = "translate(-50%, -50%)";
                playOverlay.style.color = "white";
                playOverlay.style.fontSize = "3rem";
                playOverlay.style.opacity = "0.8";
                playOverlay.style.pointerEvents = "none";
                thumbContainer.appendChild(playOverlay);

                // Make thumbnail clickable
                const link = document.createElement('a');
                link.href = `https://www.youtube.com/watch?v=${v.id}`;
                link.target = "_blank";
                link.appendChild(thumbContainer);
                card.appendChild(link);

                // Duration Badge
                if (v.duration && v.duration !== "Error" && v.duration !== "?:??") {
                    const durBadge = document.createElement('div');
                    durBadge.textContent = v.duration;
                    durBadge.style.position = "absolute";
                    durBadge.style.bottom = "8px";
                    durBadge.style.right = "8px";
                    durBadge.style.background = "rgba(0,0,0,0.8)";
                    durBadge.style.color = "white";
                    durBadge.style.padding = "2px 6px";
                    durBadge.style.borderRadius = "4px";
                    durBadge.style.fontSize = "0.8rem";
                    durBadge.style.fontFamily = "sans-serif";
                    thumbContainer.appendChild(durBadge);
                }


                // Info Section
                const info = document.createElement('div');
                info.style.padding = "15px";

                const badges = document.createElement('div');
                badges.style.marginBottom = "10px";
                badges.style.fontSize = "14px";
                badges.style.color = "#666";
                badges.style.textAlign = "center";
                badges.innerHTML = `
                    <span style="background: #e0e0e0; padding: 2px 6px; border-radius: 4px; margin-right: 5px;">${v.year}</span>
                    <span style="background: #e0e0e0; padding: 2px 6px; border-radius: 4px; margin-right: 5px;">${v.lang}</span>
                    <br><br><span style="color: #b89b65; font-weight: bold; font-family: sans-serif;">${v.type}</span>
                `;
                info.appendChild(badges);

                const title = document.createElement('h3');
                title.textContent = v.title;
                title.style.margin = "0 0 10px 0";
                title.style.fontSize = "16px";
                title.style.color = "#8b0000";
                title.style.textAlign = "center";
                title.style.fontFamily = "sans-serif";
                info.appendChild(title);

                const summary = document.createElement('p');
                summary.textContent = v.author;
                summary.style.fontSize = "0.9rem";
                summary.style.color = "#333";
                summary.style.lineHeight = "1.4";
                summary.style.textAlign = "center";
                info.appendChild(summary);

                card.appendChild(info);
                gallery.appendChild(card);
            });
        }

        // Initial render
        renderVideos();
    </script>
</body>

</html>
