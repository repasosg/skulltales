<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="utf-8">
	<title>El Contador de Historias - Capítulo 1: Cuentos y Leyendas</title>
	<link href="../css/estilos-1.css?v=1.2" rel="stylesheet">
	<link href="../css2?family=Pirata+One&amp;display=swap" rel="stylesheet">
</head>

<body>
	<div class="container">
		<center>
			<h1>El Contador de Historias</h1>
		</center>
		<h2>☠️ CAPÍTULO V: Cuentos y Leyendas</h2>

		<!-- Botones Principales -->
		<div style="text-align: center; margin-bottom: 20px;">
			<!-- Fila 1 -->
			<button onclick="mostrarSeccion('aventura'); cargarTexto('intro')">Comienzo del capítulo</button>
			<button class="boton-dorado" id="botonTravesia" onclick="mostrarSeccion('travesia')">Mostrar
				Travesía</button>
			<button class="boton-dorado" id="botonPreparacion" onclick="mostrarSeccion('preparacion')">Mostrar
				Preparación de Aventura</button>

			<div style="margin-top: 10px;">
				<button class="boton-dorado" id="botonMN" onclick="mostrarSeccion('mn')">Mostrar Momentos
					Narrativos</button>
				<button class="boton-dorado" id="botonExito" onclick="mostrarSeccion('exito')">Mostrar Éxitos</button>
				<button class="boton-dorado" id="botonObjetivos" onclick="toggleTabla('tablaObjetivos')">Mostrar
					Objetivos</button>
				<button class="boton-dorado" id="botonEnemigos" onclick="toggleTabla('tablaEnemigos')">Aparición de
					Enemigos</button>
			</div>

			<!-- Contenedores Ocultos -->
			<div class="tabla-oculta" id="tablaTravesia"></div>
			<div class="tabla-oculta" id="tablaPreparacion"></div>
			<div class="tabla-oculta" id="tablaExito"></div>
			<div class="tabla-oculta" id="tablaObjetivos"></div>
			<div class="tabla-oculta" id="tablaEnemigos"></div>
		</div>

		<!-- Contenedor de Aventura (Intro + Texto) -->
		<div id="contenedor-aventura">
			<!-- Tabla de Momentos Narrativos (Oculta por defecto, carga dinámica) -->
			<div id="tablaMN" class="tabla-oculta" style="margin-top: 20px;"></div>

			<!-- Introducción -->
			<div id="introducciones" style="margin-top: 20px;">
				<center>
					<h3>Historia</h3>
				</center>
			</div>
			<!-- Área de texto principal -->
			<div class="texto" id="texto"></div>
		</div>
	</div>
	<a class="boton-retorno" href="../index.html">← Listado de Campañas</a>
	<script src="../js/chapter-loader.js?v=1.0"></script>
	<img alt="Rosa de los Vientos" class="rosa-vientos" src="../img/rosa-vientos.png">
	<script>
		function mostrarSeccion(seccion) {
			const divAventura = document.getElementById('contenedor-aventura');
			const divTravesia = document.getElementById('tablaTravesia');
			const divPreparacion = document.getElementById('tablaPreparacion');
			const divExito = document.getElementById('tablaExito');

			if (seccion === 'aventura') {
				// Mostrar Aventura
				divAventura.style.display = 'block';
				// Asegurar que las otras están cerradas
				if (divTravesia.classList.contains('visible')) toggleTabla('tablaTravesia');
				if (divPreparacion.classList.contains('visible')) toggleTabla('tablaPreparacion');
				if (divExito.classList.contains('visible')) toggleTabla('tablaExito');

				// Resetear estado interno de Aventura (Para que se vea la Intro y no la tabla MN)
				document.getElementById('tablaMN').classList.remove('visible');
				document.getElementById('botonMN').textContent = "Mostrar Momentos Narrativos";
				document.getElementById('introducciones').style.display = 'block';
				document.getElementById('texto').style.display = 'block';

			} else if (seccion === 'travesia') {
				// Ocultar Aventura
				divAventura.style.display = 'none';
				// Cerrar otras si están abiertas
				if (divPreparacion.classList.contains('visible')) toggleTabla('tablaPreparacion');
				if (divExito.classList.contains('visible')) toggleTabla('tablaExito');
				// Toggle Travesía
				toggleTabla('tablaTravesia');

			} else if (seccion === 'preparacion') {
				// Ocultar Aventura
				divAventura.style.display = 'none';
				// Cerrar otras
				if (divTravesia.classList.contains('visible')) toggleTabla('tablaTravesia');
				if (divExito.classList.contains('visible')) toggleTabla('tablaExito');
				// Toggle Preparación
				toggleTabla('tablaPreparacion');

			} else if (seccion === 'exito') {
				// Ocultar Aventura
				divAventura.style.display = 'none';
				// Cerrar otras
				if (divTravesia.classList.contains('visible')) toggleTabla('tablaTravesia');
				if (divPreparacion.classList.contains('visible')) toggleTabla('tablaPreparacion');
				// Toggle Exito
				toggleTabla('tablaExito');

			} else if (seccion === 'mn') {
				// Lógica de MN integrada

				// A. Asegurar que estamos en Aventura
				if (divAventura.style.display === 'none') {
					divAventura.style.display = 'block';
					// Cerrar otros
					if (divTravesia.classList.contains('visible')) toggleTabla('tablaTravesia');
					if (divPreparacion.classList.contains('visible')) toggleTabla('tablaPreparacion');
					if (divExito.classList.contains('visible')) toggleTabla('tablaExito');
				}

				// B. Toggle interno MN vs Intro
				const mnDiv = document.getElementById('tablaMN');
				const btn = document.getElementById('botonMN');
				const introDiv = document.getElementById('introducciones');
				const textoDiv = document.getElementById('texto');

				// Cargar contenido si está vacío
				if (!mnDiv.hasChildNodes() && !mnDiv.innerHTML) {
					if (!ChapterLoader.cache['mn']) {
						ChapterLoader.loadContent('mn', 'mn');
					} else {
						// Si está en caché, usar registerContent para que vaya al div correcto
						ChapterLoader.registerContent('mn', ChapterLoader.cache['mn']);
					}
				}

				if (mnDiv.classList.contains('visible')) {
					// Ocultar MN -> Mostrar Historia
					mnDiv.classList.remove('visible');
					btn.textContent = "Mostrar Momentos Narrativos";
					introDiv.style.display = 'none'; // ocultar
					textoDiv.style.display = 'none'; // ocultar
					// No restaurar intro, dejar vacío como pide el usuario
				} else {
					// Mostrar MN -> Ocultar Historia
					mnDiv.classList.add('visible');
					btn.textContent = "Ocultar Momentos Narrativos";
					introDiv.style.display = 'none';
					textoDiv.style.display = 'none';

					// Re-chequeo por seguridad
					if (mnDiv.innerHTML === '' && ChapterLoader.cache['mn']) {
						mnDiv.innerHTML = ChapterLoader.cache['mn'];
					}
				}
			}
		}

		window.onload = function () {
			ChapterLoader.init('el-contador-de-historias', 'cap5', '../');
			// Iniciar en modo Aventura
			mostrarSeccion('aventura');
			cargarTexto('intro');

			// Inicializar Tracker MN
			const mns = [];
			ChapterLoader.initTracker(mns);
		};
	</script>

	<!-- Tracker Persistente -->
	<div class="container" style="margin-top: 0; padding-top: 0;">
		<center>
			<h3>Progreso de Historia</h3>
		</center>
		<div id="mn-tracker-container"></div>
	</div>
</body>

</html>
